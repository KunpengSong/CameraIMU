name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Create OSSConfig.plist
        env:
          OSS_AK: ${{ secrets.OSS_ACCESS_KEY }}
          OSS_SK: ${{ secrets.OSS_SECRET_KEY }}
        run: |
          /usr/libexec/PlistBuddy -c "Add :AccessKey string $OSS_AK" CameraIMU/Resources/OSSConfig.plist
          /usr/libexec/PlistBuddy -c "Add :SecretKey string $OSS_SK" CameraIMU/Resources/OSSConfig.plist
          cat CameraIMU/Resources/OSSConfig.plist

      - name: Build
        run: |
          xcodebuild build \
            -project CameraIMU.xcodeproj \
            -scheme CameraIMU \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_PREVIEWS=NO

      - name: Create unsigned IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "CameraIMU.app" -type d | head -1)
          # Inject app icons into the bundle
          cp AppIconAssets/AppIcon60x60@2x.png "$APP_PATH/"
          cp AppIconAssets/AppIcon60x60@3x.png "$APP_PATH/"
          cp AppIconAssets/AppIcon1024x1024.png "$APP_PATH/"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r CameraIMU.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CameraIMU-unsigned
          path: build/CameraIMU.ipa
