name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build
        run: |
          xcodebuild build \
            -project CameraIMU.xcodeproj \
            -scheme CameraIMU \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_PREVIEWS=NO

      - name: Create unsigned IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "CameraIMU.app" -type d | head -1)
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r CameraIMU.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CameraIMU-unsigned
          path: build/CameraIMU.ipa
